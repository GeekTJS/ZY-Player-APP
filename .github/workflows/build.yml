name: UniApp Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-h5:
    name: Build H5
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build H5
      run: npm run build:h5
    
    - name: Upload H5 artifacts
      uses: actions/upload-artifact@v4
      with:
        name: h5-build
        path: dist/build/h5
        retention-days: 7
    
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist/build/h5

  build-mp-weixin:
    name: Build WeChat MiniProgram
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build WeChat MiniProgram
      run: npm run build:mp-weixin
    
    - name: Upload MiniProgram artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mp-weixin-build
        path: dist/build/mp-weixin
        retention-days: 7
    
    - name: Create ZIP for distribution
      if: github.ref == 'refs/heads/main'
      run: |
        cd dist/build/mp-weixin
        zip -r ../../../mp-weixin.zip *
      shell: bash
    
    - name: Upload ZIP artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: mp-weixin-zip
        path: mp-weixin.zip
        retention-days: 30
